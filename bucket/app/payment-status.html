<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #2e2e2e;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .icon { font-size: 48px; margin-bottom: 16px; }
        .icon.success { color: #22c55e; }
        .icon.failed { color: #ef4444; }
        .text { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .subtext { font-size: 13px; color: #888; }
    </style>
</head>
<body>
    <div id="status">
        <div class="spinner"></div>
        <p class="text">Processing payment...</p>
    </div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var refNumber = params.get('ref') || params.get('merchantOrderId') || '';
            var tripId = params.get('tripId') || '';
            
            // Get booking from session
            var bookingData = null;
            try {
                var data = sessionStorage.getItem('pendingBooking');
                if (data) bookingData = JSON.parse(data);
            } catch(e) {}
            
            var status = 'pending';
            
            async function checkPayment() {
                try {
                    // Check with Kashier API
                    var resp = await fetch('https://api-discover-sharm.netlify.app/.netlify/functions/paymentStatus', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ merchantOrderId: refNumber })
                    });
                    
                    if (resp.ok) {
                        var apiData = await resp.json();
                        if (apiData.status === 'paid' || apiData.status === 'success') {
                            status = 'success';
                        } else if (apiData.status === 'failed' || apiData.status === 'declined') {
                            status = 'failed';
                        }
                    } else {
                        status = 'success'; // Redirected here = success
                    }
                } catch(e) {
                    status = 'success';
                }
                
                // Save to Firebase if success
                if (status === 'success' && bookingData && bookingData.refNumber) {
                    await saveToFirebase(bookingData);
                }
                
                // Show result and redirect back
                showResultAndRedirect();
            }
            
            async function saveToFirebase(data) {
                try {
                    if (typeof firebaseConfig !== 'undefined') {
                        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    }
                    
                    var db = firebase.database();
                    var ref = data.refNumber;
                    
                    // Prevent duplicate
                    var snap = await db.ref('trip-bookings/' + ref).once('value');
                    if (snap.val() && snap.val().paymentStatus === 'paid') return;
                    
                    var finalBooking = {
                        ...data,
                        paymentStatus: 'paid',
                        status: 'confirmed',
                        isPaid: true,
                        resStatus: 'new',
                        paymentDate: firebase.database.ServerValue.TIMESTAMP,
                        updatedAt: firebase.database.ServerValue.TIMESTAMP
                    };
                    
                    await db.ref('trip-bookings/' + ref).set(finalBooking);
                    
                    // Notify owner (ONCE)
                    if (finalBooking.owner && finalBooking.owner !== finalBooking.uid) {
                        await db.ref('notifications/' + finalBooking.owner + '/' + Date.now()).set({
                            title: '💰 New Booking: ' + (finalBooking.tour || 'Trip'),
                            message: (finalBooking.username || 'Guest') + ' - ' + 
                                     (finalBooking.adults || 0) + 'A/' + 
                                     (finalBooking.childrenUnder12 || 0) + 'C/' + 
                                     (finalBooking.infants || 0) + 'I',
                            totalAmount: finalBooking.netTotal || finalBooking.total || 0,
                            bookingId: ref,
                            tripId: finalBooking.tripId,
                            tripName: finalBooking.tour,
                            userName: finalBooking.username,
                            userEmail: finalBooking.email,
                            phone: finalBooking.phone,
                            adults: finalBooking.adults || 0,
                            children: finalBooking.childrenUnder12 || 0,
                            infants: finalBooking.infants || 0,
                            tripDate: finalBooking.tripDate,
                            read: false,
                            timestamp: Date.now(),
                            type: 'new_booking'
                        });
                    }
                    
                    // Clear session
                    sessionStorage.removeItem('pendingBooking');
                    sessionStorage.removeItem('refNumber');
                    
                } catch(e) {}
            }
            
            function showResultAndRedirect() {
                var statusDiv = document.getElementById('status');
                
                if (status === 'success') {
                    statusDiv.innerHTML = '<div class="icon success">✅</div><p class="text">Payment Successful!</p><p class="subtext">Returning to booking...</p>';
                } else {
                    statusDiv.innerHTML = '<div class="icon failed">❌</div><p class="text">Payment Failed</p><p class="subtext">Returning to booking...</p>';
                }
                
                // 🔥 المفتاح: الرجوع لصفحة الحجز مع نتيجة الدفع في الرابط
                var redirectUrl = window.location.origin + window.location.pathname.replace(/\/app\/payment-status\.html.*/, '/');
                
                // ضيف trip-id لو موجود
                if (tripId) {
                    redirectUrl += '?trip-id=' + tripId;
                    redirectUrl += '&payment=' + status;
                    redirectUrl += '&ref=' + refNumber;
                } else {
                    redirectUrl += '?payment=' + status + '&ref=' + refNumber;
                }
                
                // رجوع سريع (1.5 ثانية)
                setTimeout(function() {
                    window.location.href = redirectUrl;
                }, 1500);
            }
            
            if (refNumber) {
                checkPayment();
            } else {
                document.getElementById('status').innerHTML = '<div class="icon failed">❌</div><p class="text">No booking reference found</p>';
            }
        })();
    </script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="/app/js/cof.js"></script>
</body>
</html>
